[pytest]
testpaths = tests
# The shell sources ROS 2 Humble, which puts /opt/ros/humble site-packages (and its
# launch_testing / launch_pytest plugins) on the path. Those plugins fail to import in this
# venv (missing `lark`) and are irrelevant to our tests, so disable them up front.
addopts = -p no:launch_testing -p no:launch_ros
